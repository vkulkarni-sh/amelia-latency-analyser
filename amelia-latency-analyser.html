      </div>}
    </div>
  );
}


// ═══════════════════════════════════════════════
// PAGE 1: Conversation Troubleshooter
// ═══════════════════════════════════════════════
function Page1({ config, onOpenSettings }) {
  const [conversationId, setConversationId] = useState('');
  const [callId, setCallId] = useState('');
  const [uploadedFiles, setUploadedFiles] = useState([]);
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiAnalysis, setAiAnalysis] = useState(null);
  const [error, setError] = useState(null);
  const [expandedStage, setExpandedStage] = useState(null);
  const [expandedTurn, setExpandedTurn] = useState(null);
  const [pipelineSteps, setPipelineSteps] = useState([]);

  const onFilesAdded = (newFiles) => {
    const items = newFiles.map(f => {
      const n = f.name.toLowerCase();
      let src = 'unknown';
      if (/engine|amelia|nlu|dialog/i.test(n)) src = 'engine';
      else if (/evg|stt|tts|voice|speech|gateway/i.test(n)) src = 'evg';
      return { file: f, detectedSource: src };
    });
    setUploadedFiles(prev => [...prev, ...items]);
  };

  const onRemoveFile = (idx) => setUploadedFiles(prev => prev.filter((_, i) => i !== idx));

  const updateStep = (id, status, detail) => {
    setPipelineSteps(prev => prev.map(s => s.id === id ? { ...s, status, detail: detail || s.detail } : s));
  };

  const handleAnalyze = async () => {
    if ((!conversationId.trim() && !callId.trim()) || uploadedFiles.length === 0) return;
    setLoading(true); setError(null); setResults(null); setAiAnalysis(null); setExpandedStage(null); setExpandedTurn(null);

    const cid = conversationId.trim();
    const clid = callId.trim();

    const STEPS = [
      { id: 'read_files', label: `Reading ${uploadedFiles.length} uploaded log file(s)`, status: 'pending', detail: null },
      { id: 'filter_engine', label: 'Filtering Engine Logs by Conversation ID', status: 'pending', detail: null },
      { id: 'filter_evg', label: clid ? 'Filtering EVG Logs by Call ID' : 'Auto-discovering Call ID from Engine Logs → Filtering EVG Logs', status: 'pending', detail: null },
      { id: 'combine', label: 'Combining Engine + EVG results into unified timeline', status: 'pending', detail: null },
      { id: 'classify', label: 'Classifying logs into pipeline stages (STT, NLU, Dialog, API, TTS, EVG)', status: 'pending', detail: null },
      { id: 'build_summary', label: 'Building compact summary for LLM (not sending raw logs)', status: 'pending', detail: null },
      { id: 'ai_analyze', label: 'Sending compact payload to OpenAI for analysis', status: 'pending', detail: null },
    ];
    setPipelineSteps(STEPS);

    try {
      // Step 1: Read all files
      updateStep('read_files', 'running');
      const allParsedEntries = [];
      let totalLines = 0;
      let totalBytes = 0;

      for (const uf of uploadedFiles) {
        const text = await uf.file.text();
        totalBytes += uf.file.size;
        const entries = parseLogFile(text, uf.file.name);
        totalLines += text.split('\n').length;
        allParsedEntries.push(...entries);
      }
      updateStep('read_files', 'done', `Parsed ${allParsedEntries.length.toLocaleString()} log entries from ${uploadedFiles.length} files (${formatBytes(totalBytes)}, ${totalLines.toLocaleString()} lines)`);

      // Step 2a: Filter Engine Logs by Conversation ID
      let engineFiltered = [];
      let evgFiltered = [];

      if (cid) {
        updateStep('filter_engine', 'running');
        await sleep(50);
        const engineEntries = allParsedEntries.filter(e => e.fileSource === 'engine' || e.fileSource === 'unknown');
        engineFiltered = engineEntries.filter(e => {
          // Try structured field match first (Engine: conversationId)
          if (e.conversationId && e.conversationId === cid) return true;
          // Fallback: string search
          return e.msg?.includes(cid) || e.raw?.includes(cid);
        });
        updateStep('filter_engine', 'done', `Found ${engineFiltered.length} Engine log entries matching Conversation ID "${cid}" (from ${engineEntries.length.toLocaleString()} engine entries)`);
      } else {
        updateStep('filter_engine', 'done', 'Skipped — no Conversation ID provided');
      }

      // Step 2b: Filter EVG Logs by Call ID
      // If no Call ID provided, attempt auto-discovery from Engine logs (initAttribs / script-logger)
      let effectiveCallId = clid;
      let autoDiscoveredCallId = null;

      if (!effectiveCallId && engineFiltered.length > 0) {
        // Auto-discover Call ID from Engine logs
        const discovered = discoverCallIdFromEngine(engineFiltered);
        if (discovered) {
          effectiveCallId = discovered.sbcCallId;
          autoDiscoveredCallId = discovered;
        }
      }

      if (effectiveCallId) {
        updateStep('filter_evg', 'running', autoDiscoveredCallId
          ? `Auto-discovered SBC Call ID: ${autoDiscoveredCallId.sbcCallId} (from Engine ${autoDiscoveredCallId.source})${autoDiscoveredCallId.sipCallId ? ' | SIP: ' + autoDiscoveredCallId.sipCallId : ''}`
          : null);
        await sleep(50);
        const evgEntries = allParsedEntries.filter(e => e.fileSource === 'evg' || e.fileSource === 'unknown');

        // First pass: direct match on callId, sbcCallid, or raw string
        let initialMatch = evgEntries.filter(e => {
          if (e.callId && e.callId === effectiveCallId) return true;
          if (e.sbcCallid && e.sbcCallid === effectiveCallId) return true;
          return e.msg?.includes(effectiveCallId) || e.raw?.includes(effectiveCallId);
        });

        // Auto-discover: if user provided an sbcCallid, find the actual jambonz callId and re-filter
        // The sbcCallid appears in only a few entries, but the real callId appears in all entries for the call
        const discoveredCallIds = new Set();
        initialMatch.forEach(e => {
          if (e.callId && e.callId !== effectiveCallId) discoveredCallIds.add(e.callId);
        });

        // Also try with SIP call ID if SBC didn't match anything
        if (initialMatch.length === 0 && autoDiscoveredCallId?.sipCallId) {
          const sipId = autoDiscoveredCallId.sipCallId;
          initialMatch = evgEntries.filter(e => {
            if (e.callId && e.callId === sipId) return true;
            if (e.sbcCallid && e.sbcCallid === sipId) return true;
            return e.msg?.includes(sipId) || e.raw?.includes(sipId);
          });
          initialMatch.forEach(e => {
            if (e.callId && e.callId !== sipId) discoveredCallIds.add(e.callId);
          });
        }

        if (discoveredCallIds.size > 0) {
          // Re-filter using discovered jambonz callId(s) — this catches ALL entries for the call
          evgFiltered = evgEntries.filter(e => {
            if (e.callId && (e.callId === effectiveCallId || discoveredCallIds.has(e.callId))) return true;
            if (e.sbcCallid && e.sbcCallid === effectiveCallId) return true;
            // Also match SIP call ID if we used it
            if (autoDiscoveredCallId?.sipCallId) {
              if (e.callId && e.callId === autoDiscoveredCallId.sipCallId) return true;
            }
            return false;
          });
          const discIds = [...discoveredCallIds].join(', ');
          const autoNote = autoDiscoveredCallId ? ' (Call ID auto-discovered from Engine initAttribs)' : '';
          updateStep('filter_evg', 'done', `Found ${evgFiltered.length} EVG entries (jambonz callId: ${discIds} from SBC Call ID "${effectiveCallId}")${autoNote}`);
        } else if (initialMatch.length > 0) {
          evgFiltered = initialMatch;
          const autoNote = autoDiscoveredCallId ? ' (Call ID auto-discovered from Engine initAttribs)' : '';
          updateStep('filter_evg', 'done', `Found ${evgFiltered.length} EVG log entries matching Call ID "${effectiveCallId}"${autoNote}`);
        } else {
          evgFiltered = [];
          const autoNote = autoDiscoveredCallId ? ` (auto-discovered from Engine logs — SBC: ${autoDiscoveredCallId.sbcCallId}${autoDiscoveredCallId.sipCallId ? ', SIP: ' + autoDiscoveredCallId.sipCallId : ''})` : '';
          updateStep('filter_evg', 'done', `No EVG entries found for Call ID "${effectiveCallId}"${autoNote}. EVG log files may not be uploaded.`);
        }
      } else {
        updateStep('filter_evg', 'done', 'Skipped — no Call ID provided and none found in Engine logs');
      }

      // Step 2c: Combine
      updateStep('combine', 'running');
      await sleep(50);
      const filtered = [...engineFiltered, ...evgFiltered];
      filtered.sort((a, b) => (a.ts || '').localeCompare(b.ts || ''));
      updateStep('combine', 'done', `Combined ${engineFiltered.length} Engine + ${evgFiltered.length} EVG = ${filtered.length} total conversation logs`);

      if (filtered.length === 0) {
        const hints = [];
        if (cid) hints.push(`Conversation ID "${cid}" in Engine Logs`);
        if (clid) hints.push(`Call ID "${clid}" in EVG Logs`);
        setError(`No log entries found matching ${hints.join(' or ')} across ${uploadedFiles.length} file(s). Check that the IDs are correct and that files are categorized properly (Engine vs EVG).`);
        setLoading(false); return;
      }

      // Step 3: Classify into stages
      updateStep('classify', 'running');
      await sleep(50);
      const stageLogs = {};
      STAGE_CLASSIFIERS.forEach(s => { stageLogs[s.key] = []; });
      let uncatCount = 0;
      filtered.forEach(log => {
        const key = classifyLogEntry(log);  // Pass the entire entry object for structured field access
        if (key === 'uncategorized') { uncatCount++; }
        else { stageLogs[key].push(log); }
      });

      // Compute Submit/Return API pair latencies from Engine logs
      const apiPairLatencies = computeSubmitReturnLatencies(engineFiltered);

      // Build stage latencies — from explicit latency values in log messages + computed pairs
      // (timestamp_delta removed: it spans the whole conversation and produces nonsensical values)
      const latencies = STAGE_CLASSIFIERS.map(s => {
        const logs = stageLogs[s.key];
        if (logs.length === 0 && !(s.key === 'api' && apiPairLatencies.length > 0)) {
          return { ...s, ms: 0, method: 'none', count: 0 };
        }

        // Collect ALL explicit latency values from log messages in this stage
        const explicitValues = [];
        logs.forEach(l => {
          const ms = extractLatencyMs(l.msg);
          if (ms && ms > 0) explicitValues.push(ms);
        });

        // For the API stage, also include computed Submit/Return pair latencies
        if (s.key === 'api' && apiPairLatencies.length > 0) {
          apiPairLatencies.forEach(p => explicitValues.push(p.latencyMs));
        }

        if (explicitValues.length > 0) {
          const maxVal = Math.max(...explicitValues);
          const avgVal = explicitValues.reduce((s, v) => s + v, 0) / explicitValues.length;
          const detail = s.key === 'api' && apiPairLatencies.length > 0
            ? `${apiPairLatencies.length} API calls: ${apiPairLatencies.map(p => p.service + '=' + Math.round(p.latencyMs) + 'ms').join(', ')}`
            : null;
          return { ...s, ms: Math.round(maxVal * 100) / 100, avgMs: Math.round(avgVal * 100) / 100, method: 'explicit', count: explicitValues.length, detail };
        }

        // No explicit latency found — show log count but no bar
        return { ...s, ms: 0, method: 'none', count: logs.length };
      }).filter(l => l.ms > 0 || l.count > 0);

      // ── FULL CONVERSATION FLOW ──
      await sleep(10); // Yield to UI before heavy processing
      // Pass ALL engine entries (not just conversation-filtered) so per-turn time-window correlation
      // can pick up CognitiveProvider/LLM entries that don't contain the Conversation ID text.
      const allEngineEntries = allParsedEntries.filter(e => e.fileSource === 'engine' || e.fileSource === 'unknown');
      const conversationFlow = buildConversationFlow(evgFiltered, engineFiltered, apiPairLatencies, allEngineEntries);
      const allTurns = conversationFlow.turns;
      const turnStats = conversationFlow.stats;
      await sleep(10); // Yield after heavy processing

      // ── Enrich Stage Breakdown with computed latencies from conversation flow ──
      // The flow builder computes real latencies from timestamp deltas between boundary events.
      // Feed these back into the stage latencies so the Stage Breakdown shows real values
      // instead of "no explicit latency values".
      if (allTurns.length > 0) {
        const computedStageLatencies = {
          stt: {
            values: allTurns.map(t => {
              // Total STT time = sttActivation + speechDetection + sttRecognition + asrFinalization
              const parts = [t.sttActivationMs, t.speechDetectionMs, t.sttRecognitionMs, t.asrFinalizationMs].filter(v => v !== null && v > 0);
              return parts.length > 0 ? parts.reduce((s,v) => s+v, 0) : null;
            }).filter(v => v !== null),
            detail: () => {
              const avgActivation = Math.round(allTurns.map(t => t.sttActivationMs).filter(v => v !== null && v > 0).reduce((s,v,_,a) => s+v/a.length, 0)) || 0;
              const avgSpeechDetect = Math.round(allTurns.map(t => t.speechDetectionMs).filter(v => v !== null && v > 0).reduce((s,v,_,a) => s+v/a.length, 0)) || 0;
              const avgRecognition = Math.round(allTurns.map(t => t.sttRecognitionMs).filter(v => v !== null && v > 0).reduce((s,v,_,a) => s+v/a.length, 0)) || 0;
              const avgAsr = Math.round(allTurns.map(t => t.asrFinalizationMs).filter(v => v !== null && v > 0).reduce((s,v,_,a) => s+v/a.length, 0)) || 0;
              return `Avg: STT init ${avgActivation}ms, speech wait ${avgSpeechDetect}ms, recognition ${avgRecognition}ms, ASR timer ${avgAsr}ms`;
            },
          },
          tts: {
            values: allTurns.map(t => t.ttsLatencyMs).filter(v => v !== null && v > 0),
            detail: () => `Avg TTS synthesis: ${turnStats.ttsAvgMs}ms across ${allTurns.filter(t => t.ttsLatencyMs > 0).length} turns`,
          },
          response: {
            values: allTurns.flatMap(t => (t.llmCalls || []).map(l => l.latencyMs)).filter(v => v > 0),
            detail: () => {
              const allLlm = allTurns.flatMap(t => (t.llmCalls || []));
              if (allLlm.length === 0) return null;
              return `${allLlm.length} LLM calls: ${allLlm.map(l => (l.taskType || l.model) + '=' + Math.round(l.latencyMs) + 'ms').join(', ')}`;
            },
          },
          dialog: {
            values: allTurns.map(t => t.engineNonLlmMs).filter(v => v !== null && v > 0),
            detail: () => `Avg Engine (non-LLM) processing: ${Math.round(allTurns.map(t => t.engineNonLlmMs).filter(v => v !== null && v > 0).reduce((s,v,_,a) => s+v/a.length, 0))}ms`,
          },
          evg: {
            values: allTurns.map(t => t.webhookMs).filter(v => v !== null && v > 0),
            detail: () => `Avg webhook round-trip: ${Math.round(allTurns.map(t => t.webhookMs).filter(v => v !== null && v > 0).reduce((s,v,_,a) => s+v/a.length, 0))}ms`,
          },
        };

        latencies.forEach((lat, idx) => {
          const computed = computedStageLatencies[lat.key];
          if (computed && computed.values.length > 0 && lat.ms === 0) {
            // Stage had no explicit log-message latency but we have computed values from flow
            const maxVal = Math.max(...computed.values);
            const avgVal = computed.values.reduce((s, v) => s + v, 0) / computed.values.length;
            const detailStr = typeof computed.detail === 'function' ? computed.detail() : null;
            latencies[idx] = {
              ...lat,
              ms: Math.round(avgVal * 100) / 100,
              maxMs: Math.round(maxVal * 100) / 100,
              avgMs: Math.round(avgVal * 100) / 100,
              method: 'computed',
              count: computed.values.length,
              detail: detailStr || lat.detail,
            };
          } else if (computed && computed.values.length > 0 && lat.ms > 0) {
            // Stage already has explicit latency — add computed detail as supplementary info
            const detailStr = typeof computed.detail === 'function' ? computed.detail() : null;
            if (detailStr && !lat.detail) {
              latencies[idx] = { ...lat, detail: detailStr };
            }
          }
        });
      }

      updateStep('classify', 'done', `${allTurns.length} conversation turns mapped (avg turn latency: ${turnStats.systemAvgMs}ms), ${latencies.length} stages classified (${uncatCount} uncategorized)`);

      if (allTurns.length === 0 && latencies.length === 0) {
        setError(`Found ${filtered.length} matching logs but couldn't map conversation turns or extract stage latencies. Ensure both EVG and Engine logs are uploaded with correct IDs.`);
        setLoading(false); return;
      }

      // Compute total conversation duration from all filtered logs
      const allFilteredTimes = filtered.map(e => {
        if (!e.ts) return NaN;
        try { return new Date(e.ts).getTime(); } catch(err) { return NaN; }
      }).filter(t => !isNaN(t));
      const totalConvDuration = allFilteredTimes.length >= 2
        ? Math.max(...allFilteredTimes) - Math.min(...allFilteredTimes)
        : (turnStats?.totalDurationMs || 0);

      const total = latencies.reduce((s, l) => s + l.ms, 0);
      const bottleneckIdx = latencies.length > 0 ? latencies.reduce((maxI, l, i, arr) => l.ms > arr[maxI].ms ? i : maxI, 0) : -1;
      const bottleneckStage = bottleneckIdx >= 0 ? latencies[bottleneckIdx] : null;

      // Step 4: Build compact LLM payload
      updateStep('build_summary', 'running');
      const idLabel = [cid ? `ConversationID=${cid}` : '', clid ? `CallID=${clid}` : ''].filter(Boolean).join(', ');
      const turnData = allTurns.length > 0 ? { turns: allTurns, stats: turnStats, flow: conversationFlow } : null;
      const llmPayloadInfo = buildLLMPayload(filtered, latencies, idLabel, turnData);
      updateStep('build_summary', 'done', `Compact payload: ${llmPayloadInfo.sentLogs} key logs from ${llmPayloadInfo.totalLogs} total (${(llmPayloadInfo.payloadSize/1024).toFixed(1)}KB)`);

      const engineLogEntries = filtered.filter(l => l.fileSource === 'engine');
      const evgLogEntries = filtered.filter(l => l.fileSource === 'evg');

      const data = {
        latencies, total, stageLogs, allFilteredLogs: filtered,
        bottleneckIdx, bottleneckStage, apiPairLatencies,
        engineLogs: engineLogEntries, evgLogs: evgLogEntries,
        scannedTotal: allParsedEntries.length, filteredCount: filtered.length, llmPayloadInfo,
        conversationFlow, turns: allTurns, turnStats, totalConvDuration,
        autoDiscoveredCallId,
      };

      setResults(data);
      setLoading(false);

      // Step 5: AI Analysis
      updateStep('ai_analyze', 'running');
      setAiLoading(true);
      if (!config.openaiApiKey) {
        await sleep(1500);
        const demoStage = bottleneckStage || { key: 'evg', ms: turnStats?.worstMs || 0, label: 'EVG Orchestration' };
        setAiAnalysis(generateDemoAnalysis(demoStage));
        updateStep('ai_analyze', 'done', 'Analysis complete (demo — configure OpenAI key for live)');
      } else {
        const analysis = await analyzeWithOpenAI(config, llmPayloadInfo.payload);
        setAiAnalysis(analysis);
        updateStep('ai_analyze', 'done', 'Analysis complete');
      }
      setAiLoading(false);

    } catch (err) {
      setError(err.message);
      setLoading(false); setAiLoading(false);
    }
  };

  const hasAtLeastOneId = conversationId.trim() || callId.trim();
  const canAnalyze = hasAtLeastOneId && uploadedFiles.length > 0 && !loading;

  return (
    <div>
      <div className="page-header">
        <div className="page-title">Troubleshoot Conversation Latency</div>
        <div className="page-subtitle">Upload log files and provide the Conversation ID — the Call ID is auto-discovered from Engine logs. You can also enter the Call ID manually.</div>
      </div>
      <div className="page-body">
        <FileUploadZone files={uploadedFiles} onFilesAdded={onFilesAdded} onRemoveFile={onRemoveFile} />

        <div className="search-section">
          <div className="input-group">
            <div className="input-label">Conversation ID <span style={{opacity:0.5,textTransform:'none',fontWeight:400}}>(Engine Logs)</span></div>
            <input className="input-field" value={conversationId} onChange={e => setConversationId(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && canAnalyze && handleAnalyze()}
              placeholder="Used to search Engine Logs" />
          </div>
          <div className="input-group">
            <div className="input-label">Call ID <span style={{opacity:0.5,textTransform:'none',fontWeight:400}}>(EVG Logs — auto-discovered if blank)</span></div>
            <input className="input-field" value={callId} onChange={e => setCallId(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && canAnalyze && handleAnalyze()}
              placeholder="Optional — auto-discovered from Engine initAttribs" />
          </div>
          <button className="btn-primary" onClick={handleAnalyze} disabled={!canAnalyze}>
            {loading ? <><div className="spinner"></div> Processing...</> : 'Analyze Logs'}
          </button>
        </div>

        {!config.openaiApiKey && (
          <div className="card" style={{borderColor:'rgba(139,92,246,0.3)',marginBottom:20}}>
            <div className="card-body" style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:200}}>
                <div style={{fontSize:14,fontWeight:600,color:'var(--accent-purple)',marginBottom:4}}>OpenAI API Key Required for AI Analysis</div>
                <div style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.5}}>
                  The tool uses OpenAI's GPT-4.1 model to analyze log patterns and suggest fixes.
                  Without a key, analysis falls back to basic templates. Add your key in Settings.
                </div>
              </div>
              <button className="btn-primary" style={{background:'var(--accent-purple)',flexShrink:0}} onClick={onOpenSettings}>
                Configure API Key
              </button>
            </div>
          </div>
        )}

        {error && <div className="card" style={{borderColor:'rgba(239,68,68,0.3)'}}><div className="card-body" style={{color:'var(--accent-red)'}}><strong>Error:</strong> {error}</div></div>}

        {(loading || aiLoading) && pipelineSteps.length > 0 && <ProcessingPipeline steps={pipelineSteps} />}

        {results && (<>
          {results.autoDiscoveredCallId && (
            <div style={{background:'linear-gradient(135deg, rgba(16,185,129,0.08), rgba(6,182,212,0.08))',border:'1px solid rgba(16,185,129,0.25)',borderRadius:10,padding:'12px 18px',marginBottom:20,display:'flex',alignItems:'center',gap:12,fontSize:13}}>
              <span style={{fontSize:18}}>&#128279;</span>
              <div>
                <div style={{color:'var(--accent-green)',fontWeight:600,marginBottom:2}}>Call ID Auto-Discovered from Engine Logs</div>
                <div style={{color:'var(--text-secondary)',fontSize:12}}>
                  SBC Call ID: <code style={{background:'rgba(16,185,129,0.15)',padding:'2px 8px',borderRadius:4,fontFamily:'monospace',fontSize:11}}>{results.autoDiscoveredCallId.sbcCallId}</code>
                  {results.autoDiscoveredCallId.sipCallId && (<>
                    {' '}| SIP Call ID: <code style={{background:'rgba(6,182,212,0.15)',padding:'2px 8px',borderRadius:4,fontFamily:'monospace',fontSize:11}}>{results.autoDiscoveredCallId.sipCallId}</code>
                  </>)}
                  <span style={{opacity:0.5}}> — found in {results.autoDiscoveredCallId.source}</span>
                </div>
              </div>
            </div>
          )}
          {results.conversationFlow && results.conversationFlow.turns.length > 0 && (
            <ConversationTranscript flow={results.conversationFlow} />
          )}

          <div className="stats-grid">
            {results.turnStats && results.turnStats.turnCount > 0 ? (<>
              <div className="stat-card"><div className="stat-label">Avg Turn Latency</div>
                <div className="stat-value" style={{color: results.turnStats.systemAvgMs>3000?'var(--accent-red)':results.turnStats.systemAvgMs>1500?'var(--accent-yellow)':'var(--accent-green)'}}>{results.turnStats.systemAvgMs}<span style={{fontSize:14,opacity:0.6}}>ms</span></div>
                <div className="stat-sub">User speaks → Amelia responds ({results.turnStats.turnCount} turns)</div></div>
              <div className="stat-card"><div className="stat-label">Slowest Turn</div>
                <div className="stat-value" style={{color:'var(--accent-red)'}}>{results.turnStats.systemWorstMs}<span style={{fontSize:14,opacity:0.6}}>ms</span></div>
                <div className="stat-sub">Turn {results.turnStats.systemWorstTurn} | STT avg: {results.turnStats.sttAvgMs}ms | Engine avg: {results.turnStats.engineAvgMs}ms</div></div>
              <div className="stat-card"><div className="stat-label">Conversation</div>
                <div className="stat-value">{(results.turnStats.totalConversationMs / 1000).toFixed(1)}<span style={{fontSize:14,opacity:0.6}}>s</span></div>
                <div className="stat-sub">{results.turnStats.turnCount} turns | TTS avg: {results.turnStats.ttsAvgMs}ms | LLM avg: {results.turnStats.llmAvgMs}ms | P95: {results.turnStats.systemP95Ms}ms</div></div>
            </>) : (<>
              <div className="stat-card"><div className="stat-label">Total Stage Latency</div>
                <div className="stat-value" style={{color: results.total>3000?'var(--accent-red)':results.total>1500?'var(--accent-yellow)':'var(--accent-green)'}}>{results.total}<span style={{fontSize:14,opacity:0.6}}>ms</span></div>
                <div className="stat-sub">End-to-end</div></div>
              {results.bottleneckStage && <div className="stat-card"><div className="stat-label">Bottleneck</div>
                <div className="stat-value" style={{color:'var(--accent-red)',fontSize:18}}>{results.bottleneckStage.label}</div>
                <div className="stat-sub">{results.bottleneckStage.ms}ms — {results.bottleneckStage.source}</div></div>}
            </>)}
            <div className="stat-card"><div className="stat-label">Logs Matched</div>
              <div className="stat-value">{results.filteredCount}</div>
              <div className="stat-sub">From {results.scannedTotal?.toLocaleString()} scanned ({results.engineLogs?.length || 0} Engine + {results.evgLogs?.length || 0} EVG)</div></div>
            <div className="stat-card"><div className="stat-label">Health</div><div className="stat-value">
              {(() => {
                const checkMs = results.turnStats?.systemAvgMs || results.total;
                return checkMs<1500?<span className="badge badge-green"><span className="badge-dot"></span> Healthy</span>:
                 checkMs<3000?<span className="badge badge-yellow"><span className="badge-dot"></span> Degraded</span>:
                 <span className="badge badge-red"><span className="badge-dot"></span> Critical</span>;
              })()}
            </div><div className="stat-sub">Based on {results.turnStats?.turnCount > 0 ? 'avg system latency' : 'total latency'}</div></div>
          </div>

          {results.conversationFlow && results.conversationFlow.turns.length > 0 && (
            <div className="card">
              <div className="card-header">
                <div className="card-title">Conversation Flow Timeline</div>
                <span style={{fontSize:12,color:'var(--text-muted)'}}>Full call cycle: Amelia → TTS → User → STT → Engine → Integrations → Amelia. Click a turn to drill down.</span>
              </div>
              <div className="card-body">
                <ConversationFlowTimeline flow={results.conversationFlow} expandedTurn={expandedTurn} onToggleTurn={i => setExpandedTurn(p => p===i?null:i)} />
                {results.turnStats && results.turnStats.systemWorstTurn && (
                  <div className="pinpoint-indicator">
                    <span><strong>Slowest:</strong> Turn {results.turnStats.systemWorstTurn} at {results.turnStats.systemWorstMs}ms
                    {results.conversationFlow.turns.find(t => t.turnNumber === results.turnStats.systemWorstTurn)?.userText &&
                      ` — user said "${results.conversationFlow.turns.find(t => t.turnNumber === results.turnStats.systemWorstTurn).userText.substring(0, 60)}"`}
                    {' '}| Avg: {results.turnStats.systemAvgMs}ms | Median: {results.turnStats.systemMedianMs}ms | P95: {results.turnStats.systemP95Ms}ms</span>
                  </div>
                )}
              </div>
            </div>
          )}

          {results.latencies && results.latencies.length > 0 && (
            <div className="card">
              <div className="card-header"><div className="card-title">Stage Breakdown</div><span style={{fontSize:12,color:'var(--text-muted)'}}>Latency by pipeline stage — click to expand logs</span></div>
              <div className="card-body">
                <StageBreakdownChart latencies={results.latencies} stageLogs={results.stageLogs} expandedStage={expandedStage} onToggleStage={k => setExpandedStage(p => p===k?null:k)} />
                {results.bottleneckStage && (
                  <div className="pinpoint-indicator" style={{marginTop:8}}><span><strong>Stage bottleneck:</strong> {results.bottleneckStage.label} ({results.bottleneckStage.source}) at {results.bottleneckStage.ms}ms</span></div>
                )}
              </div>
            </div>
          )}

          <div className="card">
            <div className="card-header"><div className="card-title">Intelligent Analysis</div>
              {!config.openaiApiKey && <span style={{fontSize:11,color:'var(--text-muted)'}}>Demo — configure OpenAI key for live</span>}
            </div>
            <div className="card-body"><AIAnalysis analysis={aiAnalysis} loading={aiLoading} payloadInfo={results.llmPayloadInfo} /></div>
          </div>

          <div className="card">
            <div className="card-header"><div className="card-title">All Filtered Logs ({results.filteredCount})</div><span style={{fontSize:12,color:'var(--text-muted)'}}>Only logs matching conversation/call ID</span></div>
            <div className="card-body"><LogViewer engineLogs={results.engineLogs} evgLogs={results.evgLogs} /></div>
          </div>
        </>)}

        {!results && !loading && uploadedFiles.length === 0 && (
          <div className="empty-state">
            <div className="empty-icon">&#128194;</div>
            <div className="empty-title">Upload Log Files to Get Started</div>
            <div className="empty-desc">
              Drop your Engine Logs and EVG Logs above. Engine Logs are searched by Conversation ID,
              EVG Logs are searched by Call ID. The tool classifies entries by stage and pinpoints the bottleneck.
              Only a compact summary is sent to OpenAI for analysis — never the raw files.
            </div>
          </div>
        )}

        {!results && !loading && uploadedFiles.length > 0 && (
          <div className="empty-state">
            <div className="empty-icon">&#128270;</div>
            <div className="empty-title">Enter Conversation ID and/or Call ID</div>
            <div className="empty-desc">
              {uploadedFiles.length} file(s) loaded ({formatBytes(uploadedFiles.reduce((s,f)=>s+f.file.size,0))}).
              Enter a Conversation ID (to search Engine Logs) and/or a Call ID (to search EVG Logs), then click Analyze.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// PAGE 2: Client Monitoring Dashboard
// ═══════════════════════════════════════════════
function Page2({ config }) {
  const [timePeriod, setTimePeriod] = useState('24h');
  const [metricType, setMetricType] = useState('all');
  const [clients, setClients] = useState([]);
  const [loading, setLoading] = useState(false);
  const [sortBy, setSortBy] = useState('p99');
  const [sortDir, setSortDir] = useState('desc');

  useEffect(() => { setLoading(true); setTimeout(() => { setClients(generateDemoClientData()); setLoading(false); }, 800); }, [timePeriod]);
  const sorted = [...clients].sort((a, b) => { if (sortBy==='name') return a.name.localeCompare(b.name)*(sortDir==='desc'?-1:1); return (a[sortBy]-b[sortBy])*(sortDir==='desc'?-1:1); });
  const handleSort = (c) => { if (sortBy===c) setSortDir(d=>d==='desc'?'asc':'desc'); else { setSortBy(c); setSortDir('desc'); } };
  const getLC = (ms) => ms<500?'latency-good':ms<1500?'latency-moderate':'latency-bad';
  const getLBC = (ms) => ms<500?'var(--accent-green)':ms<1500?'var(--accent-yellow)':'var(--accent-red)';
  const maxP99 = Math.max(...clients.map(c=>c.p99),1);
  const stBadge = (s) => { const m={healthy:'badge-green',degraded:'badge-yellow',down:'badge-red'}; return <span className={`badge ${m[s]||'badge-green'}`}><span className="badge-dot"></span> {s}</span>; };

  return (
    <div>
      <div className="page-header"><div className="page-title">Client Monitoring Dashboard</div><div className="page-subtitle">Monitor P50, P95, and P99 latencies across all Amelia clients</div></div>
      <div className="page-body">
        <div className="wip-banner"><span>WIP</span><span><strong>Work in Progress</strong> — Requires Service Account token and client URL mappings. Showing simulated data.</span></div>
        <div className="filter-bar">
          <div className="filter-group"><div className="input-label">Time Period</div>
            <select className="input-field" value={timePeriod} onChange={e=>setTimePeriod(e.target.value)}>
              <option value="1h">Last 1 Hour</option><option value="6h">Last 6 Hours</option><option value="24h">Last 24 Hours</option><option value="7d">Last 7 Days</option><option value="30d">Last 30 Days</option>
            </select></div>
          <div className="filter-group"><div className="input-label">Metric Focus</div>
            <select className="input-field" value={metricType} onChange={e=>setMetricType(e.target.value)}>
              <option value="all">All Metrics</option><option value="stt">STT</option><option value="tts">TTS</option><option value="nlu">NLU</option><option value="evg">EVG</option><option value="e2e">End-to-End</option>
            </select></div>
          <button className="btn-primary" onClick={()=>{setLoading(true);setTimeout(()=>{setClients(generateDemoClientData());setLoading(false);},600);}}>Refresh</button>
        </div>
        <div className="stats-grid">
          <div className="stat-card"><div className="stat-label">Clients Monitored</div><div className="stat-value">{clients.length}</div><div className="stat-sub">Active instances</div></div>
          <div className="stat-card"><div className="stat-label">Avg P50</div><div className="stat-value" style={{color:'var(--accent-green)'}}>{clients.length?Math.round(clients.reduce((s,c)=>s+c.p50,0)/clients.length):'—'}<span style={{fontSize:14,opacity:0.6}}>ms</span></div></div>
          <div className="stat-card"><div className="stat-label">Avg P95</div><div className="stat-value" style={{color:'var(--accent-yellow)'}}>{clients.length?Math.round(clients.reduce((s,c)=>s+c.p95,0)/clients.length):'—'}<span style={{fontSize:14,opacity:0.6}}>ms</span></div></div>
          <div className="stat-card"><div className="stat-label">Avg P99</div><div className="stat-value" style={{color:'var(--accent-red)'}}>{clients.length?Math.round(clients.reduce((s,c)=>s+c.p99,0)/clients.length):'—'}<span style={{fontSize:14,opacity:0.6}}>ms</span></div></div>
        </div>
        <div className="card">
          <div className="card-header"><div className="card-title">Client Latencies — {timePeriod}</div><span style={{fontSize:12,color:'var(--text-muted)'}}>Click headers to sort</span></div>
          <div className="card-body" style={{padding:0}}>
            {loading ? <div style={{padding:20}}>{[1,2,3,4,5].map(i=><div className="loading-skeleton" key={i} style={{width:'100%',height:40,marginBottom:8}}></div>)}</div> :
            <table className="client-table"><thead><tr>
              <th style={{cursor:'pointer'}} onClick={()=>handleSort('name')}>Client {sortBy==='name'?(sortDir==='desc'?'↓':'↑'):''}</th>
              <th>Status</th>
              <th style={{cursor:'pointer'}} onClick={()=>handleSort('p50')}>P50 {sortBy==='p50'?(sortDir==='desc'?'↓':'↑'):''}</th>
              <th style={{cursor:'pointer'}} onClick={()=>handleSort('p95')}>P95 {sortBy==='p95'?(sortDir==='desc'?'↓':'↑'):''}</th>
              <th style={{cursor:'pointer'}} onClick={()=>handleSort('p99')}>P99 {sortBy==='p99'?(sortDir==='desc'?'↓':'↑'):''}</th>
              <th>Distribution</th>
              <th style={{cursor:'pointer'}} onClick={()=>handleSort('totalConversations')}>Conversations {sortBy==='totalConversations'?(sortDir==='desc'?'↓':'↑'):''}</th>
            </tr></thead><tbody>
              {sorted.map((c,i)=><tr key={i}>
                <td><div style={{fontWeight:500}}>{c.name}</div><div style={{fontSize:11,color:'var(--text-muted)'}}>{c.url}</div></td>
                <td>{stBadge(c.status)}</td>
                <td className={`latency-cell ${getLC(c.p50)}`}>{c.p50}ms</td>
                <td className={`latency-cell ${getLC(c.p95)}`}>{c.p95}ms</td>
                <td className={`latency-cell ${getLC(c.p99)}`}>{c.p99}ms</td>
                <td><div className="mini-bar-container">
                  <div className="mini-bar-bg"><div className="mini-bar-fill" style={{width:`${(c.p50/maxP99)*100}%`,background:getLBC(c.p50),opacity:0.5}}></div></div>
                  <div className="mini-bar-bg"><div className="mini-bar-fill" style={{width:`${(c.p95/maxP99)*100}%`,background:getLBC(c.p95),opacity:0.7}}></div></div>
                  <div className="mini-bar-bg"><div className="mini-bar-fill" style={{width:`${(c.p99/maxP99)*100}%`,background:getLBC(c.p99)}}></div></div>
                </div></td>
                <td style={{fontVariantNumeric:'tabular-nums'}}>{c.totalConversations.toLocaleString()}</td>
              </tr>)}
            </tbody></table>}
          </div>
        </div>
        <div className="card"><div className="card-header"><div className="card-title">Latency Trends Over Time</div></div>
          <div className="card-body"><div className="empty-state" style={{padding:'40px 20px'}}><div className="empty-icon">&#128200;</div><div className="empty-title">Coming Soon</div><div className="empty-desc">Time-series charts will be available once Service Account and client URL mappings are configured.</div></div></div>
        </div>
      </div>
    </div>
  );
}

// APP
// ═══════════════════════════════════════════════
function App() {
  const [page, setPage] = useState(1);
  const [showConfig, setShowConfig] = useState(false);
  const [config, setConfig] = useState(DEFAULT_CONFIG);
  return (
    <div className="app-container">
      <div className="sidebar">
        <div className="sidebar-logo"><div className="logo-icon">A</div><div><div className="logo-text">Amelia Latency</div><div className="logo-sub">Analyser</div></div></div>
        <div className="sidebar-nav">
          <div className={`nav-item ${page===1?'active':''}`} onClick={()=>setPage(1)}><span className="nav-icon">&#128269;</span><span>Troubleshoot</span></div>
          <div className={`nav-item ${page===2?'active':''}`} onClick={()=>setPage(2)}><span className="nav-icon">&#128225;</span><span>Client Monitoring</span></div>
        </div>
        <div className="sidebar-config"><button className="config-btn" onClick={()=>setShowConfig(true)}><span>&#9881;</span> Settings</button></div>
      </div>
      <div className="main-content">{page===1?<Page1 config={config} onOpenSettings={()=>setShowConfig(true)} />:<Page2 config={config} />}</div>
      {showConfig && <ConfigModal config={config} onSave={setConfig} onClose={()=>setShowConfig(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
